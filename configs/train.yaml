# ==========================================================
# ThelerineVTON Training Configuration
# ==========================================================

experiment:

  name: thelerine_vton_v2_swap

  output_dir: outputs/thelerine_vton_v2_swap

  seed: 42

# ==========================================================
# Dataset
# ==========================================================

dataset:

  root: /content/drive/MyDrive/thelerineAI/Itekanye1.1_TripletDataset

  train_manifest: /content/drive/MyDrive/thelerineAI/Itekanye1.1_TripletDataset/swap_manifest.jsonl

  val_manifest: /content/drive/MyDrive/thelerineAI/Itekanye1.1_TripletDataset/swap_manifest.jsonl

  image_size: 256

# ==========================================================
# DataLoader
# ==========================================================

dataloader:

  batch_size: 1

  shuffle: true

  num_workers: 0

  pin_memory: true

# ==========================================================
# Model
# ==========================================================

model:

  base_channels: 64

# ==========================================================
# Optimizer
# ==========================================================

optimizer:

  name: adamw

  learning_rate: 0.0002

  weight_decay: 0.00001

# ==========================================================
# Learning Rate Scheduler
# ==========================================================

scheduler:

  name: cosine

  min_lr: 0.000001

# ==========================================================
# Loss Weights
# ==========================================================

loss:

  image_weight: 1.0

  perceptual_weight: 0.0

  edge_weight: 0.2

  garment_weight: 2.0

# ==========================================================
# Training
# ==========================================================

training:

  epochs: 10

  mixed_precision: true

  gradient_clip: 1.0

# ==========================================================
# Checkpoints
# ==========================================================

checkpoint:

  save_every: 5

# ==========================================================
# Validation
# ==========================================================

validation:

  enabled: true

  every: 1

# ==========================================================
# Logging
# ==========================================================

logging:

  tensorboard: true

  save_images_every: 1

  log_every: 20
